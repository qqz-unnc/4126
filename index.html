<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intra-Vehicle Network IDS Literature</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 1200px; margin: 0 auto; padding: 20px; }
        li { margin: 10px 0; padding: 10px; border: 1px solid #ccc; }
        h1, h3 { text-align: center; }
    </style>
</head>
<body>
    <h1>Intra-Vehicle Network Intrusion Detection</h1>
    <h3>Paper List (Direct Render - SurVis Bypass)</h3>
    <ul id="paperList" style="list-style: none; padding: 0;"></ul>

    <!-- Load literature data file -->
    <script src="data/generated/bib.js"></script>

    <!-- Render paper list with native JavaScript -->
    <script>
        window.addEventListener('load', function() {
            setTimeout(() => {
                if (typeof bibEntries === 'undefined') {
                    document.body.innerHTML = "<h1>Data Not Found</h1>";
                    return;
                }

                const paperList = document.getElementById('paperList');
                const papers = Object.values(bibEntries);
                document.querySelector('h3').textContent = `Total Papers Loaded: ${papers.length}`;

                papers.forEach(paper => {
                    const li = document.createElement('li');
                    li.innerHTML = `
                        <h4>${paper.title}</h4>
                        <p><strong>Authors:</strong> ${paper.authors.join(', ')}</p>
                        <p><strong>Year:</strong> ${paper.year} | <strong>Journal:</strong> ${paper.journal || paper.booktitle || 'Conference'}</p>
                        <p><a href="${paper.url}" target="_blank">View Paper</a></p>
                    `;
                    paperList.appendChild(li);
                });
            }, 500);
        });
    </script>
</body>
</html>
